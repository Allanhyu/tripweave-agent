name: Feature request
description: 提议新的旅行规划或 Agent 能力
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 使用场景
      description: 当前工作流中遇到了什么问题？
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 建议方案
      description: 描述期望的交互、接口或 Agent 行为。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 其他方案
